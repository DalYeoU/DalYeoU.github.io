<h3>Categories</h3>
<ul>
  {% assign categories = site.posts | map: "categories" | join: "," | split: "," | uniq | sort %}
  {% for category in categories %}
    {% assign count = site.posts | where_exp: "post", "post.categories contains category" | size %}
    <li>
      <a href="/categories/#{{ category | slugify }}">
        {{ category }}
        <span class="sidebar-badge">{{ count }}</span>
      </a>
    </li>
  {% endfor %}
</ul>
