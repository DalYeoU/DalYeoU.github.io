<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <title>
    {% if page.title %}{{ page.title | escape }} - {{ site.title | escape }}
    {% else %}{{ site.title | escape }}{% endif %}
  </title>

  <meta name="description"
    content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">

  <link href='https://fonts.googleapis.com/css?family=Lora:400,700,400italic,700italic' rel='stylesheet'
    type='text/css'>
  <link
    href='https://fonts.googleapis.com/css?family=Open+Sans:300italic,400italic,600italic,700italic,800italic,400,300,600,700,800'
    rel='stylesheet' type='text/css'>

  <script src="https://use.fontawesome.com/releases/v5.15.3/js/all.js" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
  <!-- Google Fonts: Noto Sans KR -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    /* 전체 폰트 강제 적용 */
    body,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    .navbar-brand,
    .nav-link,
    .post-title,
    .post-subtitle,
    .btn,
    table {
      font-family: 'Noto Sans KR', sans-serif !important;
    }

    /* 1. 공통 폰트 설정 */
    code,
    pre {
      font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace !important;
    }

    /* 2. 코드 블록 (highlight) - 밝은 회색 배경 */
    div.highlight,
    pre {
      background-color: #f6f8fa !important;
      /* 밝은 회색 배경 (GitHub 스타일) */
      padding: 1.5rem !important;
      border-radius: 10px !important;
      /* 모서리 둥글게 */
      margin: 1.5rem 0 !important;
      overflow-x: auto !important;
      /* 코드가 길면 가로 스크롤 */
    }

    /* 3. 코드 블록 내부의 pre, code 태그 스타일 초기화 */
    div.highlight pre,
    div.highlight code {
      background-color: transparent !important;
      padding: 0 !important;
      border: none !important;
      margin: 0 !important;
      line-height: 1.6 !important;
      font-family: SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace !important;
    }

    /* 4. 문장 속 인라인 코드 (code) */
    :not(pre)>code {
      background-color: #eff0f1 !important;
      /* 살짝 밝은 회색 */
      color: #333 !important;
      /* 어두운 글씨 */
      padding: 0.2rem 0.4rem !important;
      border-radius: 6px !important;
      font-size: 0.9em;
    }

    /* 5. Syntax Highlighting 스타일 (Light Theme) */
    .highlight .c { color: #6a737d; } /* Comment */
    .highlight .k { color: #d73a49; } /* Keyword */
    .highlight .o { color: #d73a49; } /* Operator */
    .highlight .cm { color: #6a737d; } /* Comment.Multiline */
    .highlight .cp { color: #6a737d; } /* Comment.Preproc */
    .highlight .c1 { color: #6a737d; } /* Comment.Single */
    .highlight .cs { color: #6a737d; font-weight: bold; } /* Comment.Special */
    .highlight .gd { color: #f00; background-color: #fff0f0 } /* Generic.Deleted */
    .highlight .ge { font-style: italic } /* Generic.Emph */
    .highlight .gr { color: #f00 } /* Generic.Error */
    .highlight .gh { color: #000080; font-weight: bold } /* Generic.Heading */
    .highlight .gi { color: #008000; background-color: #f0fff0 } /* Generic.Inserted */
    .highlight .go { color: #888 } /* Generic.Output */
    .highlight .gp { color: #000080; font-weight: bold } /* Generic.Prompt */
    .highlight .gs { font-weight: bold } /* Generic.Strong */
    .highlight .gu { color: #800080; font-weight: bold } /* Generic.Subheading */
    .highlight .gt { color: #a00 } /* Generic.Traceback */
    .highlight .kc { color: #005cc5; } /* Keyword.Constant */
    .highlight .kd { color: #d73a49; } /* Keyword.Declaration */
    .highlight .kn { color: #d73a49; } /* Keyword.Namespace */
    .highlight .kp { color: #d73a49; } /* Keyword.Pseudo */
    .highlight .kr { color: #d73a49; } /* Keyword.Reserved */
    .highlight .kt { color: #d73a49; } /* Keyword.Type */
    .highlight .m { color: #005cc5; } /* Literal.Number */
    .highlight .s { color: #032f62; } /* Literal.String */
    .highlight .nb { color: #005cc5; } /* Name.Builtin */
    .highlight .nc { color: #e36209; } /* Name.Class */
    .highlight .nf { color: #6f42c1; } /* Name.Function */
    .highlight .nt { color: #22863a; } /* Name.Tag */
    .highlight .nv { color: #e36209; } /* Name.Variable */
  </style>

  <link rel="canonical" href="{{ page.url | replace:'index.html','' | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ " /feed.xml" |
    relative_url }}">
  <link rel="icon" type="image/png" href="{{ " /img/favicon.png" | relative_url }}">

</head>
