<!-- Medium Zoom 라이브러리 추가 -->
<script src="https://cdn.jsdelivr.net/npm/medium-zoom/dist/medium-zoom.min.js"></script>
<script>
  // .img-fluid 클래스가 있거나 figure 태그 안의 이미지에 확대 기능 적용
  mediumZoom('.img-fluid, figure img', {
    margin: 24,
    background: '#212529', // 확대 시 배경색 (어두운 회색)
    scrollOffset: 0,
  });
</script>

<script>
  window.addEventListener('scroll', function() {
    const sidebar = document.querySelector('.sidebar');
    const wrapper = document.querySelector('.content-wrapper');
    if (!sidebar || !wrapper) return;

    const offsetTop = 80;
    const wrapperTop = wrapper.getBoundingClientRect().top + window.scrollY;
    const sidebarWidth = sidebar.getBoundingClientRect().width || 220; // 너비 0 방지

    if (window.scrollY > wrapperTop - offsetTop) {
      sidebar.style.position = 'fixed';
      sidebar.style.top = offsetTop + 'px';
      sidebar.style.width = sidebarWidth + 'px';
      document.querySelector('.main-content').style.marginLeft = (sidebarWidth + 20) + 'px';
    } else {
      sidebar.style.position = 'relative';
      sidebar.style.top = '0';
      sidebar.style.width = '';
      document.querySelector('.main-content').style.marginLeft = '0';
    }
  });
</script>
