<!-- LightGallery 라이브러리 추가 (보여주신 사진과 같은 갤러리 스타일) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/css/lightgallery.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/css/lg-thumbnail.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/css/lg-zoom.min.css" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/lightgallery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/plugins/thumbnail/lg-thumbnail.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lightgallery/2.7.2/plugins/zoom/lg-zoom.min.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    // 블로그 본문(.main-content) 내의 이미지들을 갤러리로 연결
    const container = document.querySelector('.main-content');
    if (container) {
      lightGallery(container, {
        selector: '.img-fluid, figure img', // 갤러리에 포함시킬 이미지 선택자
        plugins: [lgZoom, lgThumbnail],     // 줌, 썸네일 플러그인 활성화
        speed: 500,
        thumbnail: true,                    // 우측(또는 하단) 썸네일 보이기
        zoom: true                          // 확대 기능 활성화
      });
    }
  });
</script>

<script>
  window.addEventListener('scroll', function() {
    const sidebar = document.querySelector('.sidebar');
    const wrapper = document.querySelector('.content-wrapper');
    if (!sidebar || !wrapper) return;

    const offsetTop = 80;
    const wrapperTop = wrapper.getBoundingClientRect().top + window.scrollY;
    const sidebarWidth = sidebar.getBoundingClientRect().width || 220; // 너비 0 방지

    if (window.scrollY > wrapperTop - offsetTop) {
      sidebar.style.position = 'fixed';
      sidebar.style.top = offsetTop + 'px';
      sidebar.style.width = sidebarWidth + 'px';
      document.querySelector('.main-content').style.marginLeft = (sidebarWidth + 20) + 'px';
    } else {
      sidebar.style.position = 'relative';
      sidebar.style.top = '0';
      sidebar.style.width = '';
      document.querySelector('.main-content').style.marginLeft = '0';
    }
  });
</script>
